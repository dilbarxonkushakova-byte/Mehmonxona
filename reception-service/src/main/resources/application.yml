spring:
  application:
    name: reception-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/hotelos_reception
    username: ${DB_USER:hotelos}
    password: ${DB_PASS:hotelos}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

server:
  port: 8081

logging:
  level:
    com.grandstay: INFO
